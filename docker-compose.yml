services:
  me:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: me
    environment:
      - ME_HOME=/app/me_data
      - ME_STATIC_DIR=/app/static
      - LLM_API_BASE=http://192.168.1.100:11434/v1
      - LLM_MODEL=qwen2.5:7b
      - EMBEDDING_API_BASE=http://192.168.1.100:11434/v1
      - EMBEDDING_MODEL=nomic-embed-text
    ports:
      - "6868:6868"
    volumes:
      - ./me_data:/app/me_data
    restart: unless-stopped
